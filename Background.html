<!DOCTYPE html>
<html>
<head>
<title>Qwertxy</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #1a1a1a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

/* container */
.browser-box {
    text-align: center;
}

/* input */
input {
    width: 400px;
    padding: 14px;
    border-radius: 30px;
    border: none;
    outline: none;
    font-size: 16px;
    background: #111;
    color: white;
    box-shadow: 0 0 10px rgba(0, 255, 200, 0.2);
}

/* button */
button {
    margin-left: 10px;
    padding: 14px 20px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: white;
    background: linear-gradient(45deg, #00ffcc, #0066ff);
    transition: 0.2s;
}

/* hover effect */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0, 255, 200, 0.6);
}
</style>
</head>

<body>

<div class="browser-box">
    <input type="text" placeholder="Search or enter URL...">
    <button>Go</button>
</div>

</body>
</html>
